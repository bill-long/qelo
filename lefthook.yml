# Git hooks, managed by lefthook. Run `npx lefthook install` after cloning.
pre-commit:
  parallel: false
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: npx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    - name: eslint
      glob: "src/**/*.{ts,tsx}"
      run: npx eslint {staged_files}
    - name: typecheck
      # tsc has no meaningful per-file mode, so check the whole project.
      run: npm run typecheck
    - name: rustfmt
      glob: "src-tauri/**/*.rs"
      root: "src-tauri/"
      run: cargo fmt --check
    - name: clippy
      glob: "src-tauri/**/*.rs"
      root: "src-tauri/"
      # clippy is whole-crate, not per-file; -D warnings makes lint failures block.
      run: cargo clippy --all-targets -- -D warnings

pre-push:
  jobs:
    - name: test
      run: npm test
